<svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">

<style>
text {
  font-family: monospace;
  fill: #58a6ff;
}
.bar {
  fill: #238636;
}
</style>

<!-- WITH CF -->
<text x="10" y="35">With CF</text>
<rect class="bar" x="120" y="20" width="10">
  <animate attributeName="width"
           from="0"
           to="10"
           dur="1s"
           fill="freeze" />
</rect>
<text x="140" y="35">10.3</text>

<!-- WITHOUT CF -->
<text x="10" y="80">Without CF</text>
<rect class="bar" x="120" y="65" width="450">
  <animate attributeName="width"
           from="0"
           to="450"
           dur="2s"
           fill="freeze" />
</rect>
<text x="580" y="80">947.0</text>

</svg>
