name: Deploy Public GUI to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify Pages GUI files
        run: |
          test -f web/pages/index.html

      - name: Validate public GUI contract
        run: |
          grep -q 'id="api-key"' web/pages/index.html
          grep -q 'id="run-btn"' web/pages/index.html
          grep -q 'id="stats-cards"' web/pages/index.html
          grep -q 'id="rep-bars"' web/pages/index.html
          grep -q 'id="source-bars"' web/pages/index.html
          grep -q 'id="selected-blocks"' web/pages/index.html
          grep -q 'id="context-preview"' web/pages/index.html
          grep -q 'id="model-answer"' web/pages/index.html

      - name: Build Pages artifact root
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R web/pages/. _site/
          touch _site/.nojekyll
          test -f _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
